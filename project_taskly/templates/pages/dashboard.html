{% extends 'components/base.html' %}

{% block title %}Dashboard - taskly{% endblock %}

{% block content %}
<div class="d-flex flex-column justify-content-center align-items-center text-center" style="min-height: 100vh;">
    <h3 class="fw-bold mb-3 text-white">
        Welcome, {{ request.session.user_name }}
    </h3>
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4 py-2 rounded-3 shadow">
            <i class="bi bi-box-arrow-right me-2"></i>Logout
        </button>
    </form>
</div>
{% endblock %}
